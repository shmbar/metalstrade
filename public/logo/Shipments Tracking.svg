<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 37.5 37.5" fill="none">

  <!-- Ship hull -->
  <path fill="#183d79" fill-rule="nonzero"
    d="M 4.5 23.5 L 6.5 17 L 31 17 L 33 23.5 C 26 27 11.5 27 4.5 23.5 Z" />

  <!-- Hull outline inner highlight -->
  <path fill="#ffffff" fill-opacity="0.15" fill-rule="nonzero"
    d="M 7 22.5 L 8.2 18.2 L 29.8 18.2 L 31 22.5 C 25 25.5 13 25.5 7 22.5 Z" />

  <!-- Deck / top edge of hull -->
  <rect fill="#183d79" x="6" y="16" width="25.5" height="1.8" rx="0.4" />

  <!-- Container stack left -->
  <rect fill="#183d79" x="7.5" y="10.5" width="6" height="5.5" rx="0.5" />
  <rect fill="#ffffff" fill-opacity="0.18" x="7.5" y="10.5" width="6" height="2.5" rx="0.5" />
  <line x1="10.5" y1="10.5" x2="10.5" y2="16" stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.6"/>

  <!-- Container stack middle -->
  <rect fill="#183d79" x="15" y="10.5" width="6" height="5.5" rx="0.5" />
  <rect fill="#ffffff" fill-opacity="0.18" x="15" y="10.5" width="6" height="2.5" rx="0.5" />
  <line x1="18" y1="10.5" x2="18" y2="16" stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.6"/>

  <!-- Bridge / cabin (right) -->
  <rect fill="#183d79" x="22.5" y="8" width="7" height="8" rx="0.8" />
  <rect fill="#ffffff" fill-opacity="0.18" x="22.5" y="8" width="7" height="3" rx="0.8" />
  <!-- Bridge windows -->
  <rect fill="#ffffff" fill-opacity="0.55" x="23.5" y="9.2" width="1.6" height="1.2" rx="0.3" />
  <rect fill="#ffffff" fill-opacity="0.55" x="25.8" y="9.2" width="1.6" height="1.2" rx="0.3" />
  <rect fill="#ffffff" fill-opacity="0.55" x="28" y="9.2" width="1" height="1.2" rx="0.3" />

  <!-- Mast/funnel -->
  <rect fill="#183d79" x="24.5" y="5" width="1.2" height="3.2" rx="0.4" />
  <rect fill="#183d79" x="23.8" y="4.2" width="2.6" height="1" rx="0.3" />

  <!-- Water / waves -->
  <path fill="#183d79" fill-opacity="0.45" fill-rule="nonzero"
    d="M 3 26.5 Q 6.5 24.8 10 26.5 Q 13.5 28.2 17 26.5 Q 20.5 24.8 24 26.5 Q 27.5 28.2 31 26.5 Q 33 25.5 34.5 26.2 L 34.5 29 Q 33 28.2 31 29 Q 27.5 30.8 24 29 Q 20.5 27.2 17 29 Q 13.5 30.8 10 29 Q 6.5 27.2 3 29 Z" />

  <!-- Second wave -->
  <path fill="#183d79" fill-opacity="0.22" fill-rule="nonzero"
    d="M 3 29.5 Q 6.5 27.8 10 29.5 Q 13.5 31.2 17 29.5 Q 20.5 27.8 24 29.5 Q 27.5 31.2 31 29.5 Q 33 28.5 34.5 29.2 L 34.5 32 Q 33 31.2 31 32 Q 27.5 33.8 24 32 Q 20.5 30.2 17 32 Q 13.5 33.8 10 32 Q 6.5 30.2 3 32 Z" />

</svg>
